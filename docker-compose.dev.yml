services:
  db:
    image: postgis/postgis:16-3.4
    environment:
      POSTGRES_DB: igs
      POSTGRES_USER: igs
      POSTGRES_PASSWORD: igs_dev_2024
    ports:
      - '5432:5432'
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./server/migrations:/docker-entrypoint-initdb.d
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U igs']
      interval: 5s
      timeout: 3s
      retries: 5

volumes:
  pgdata:
