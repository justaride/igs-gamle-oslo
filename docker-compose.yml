services:
  db:
    image: postgis/postgis:16-3.4
    environment:
      POSTGRES_DB: igs
      POSTGRES_USER: igs
      POSTGRES_PASSWORD: ${DB_PASSWORD:-igs_dev_2024}
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./server/migrations:/docker-entrypoint-initdb.d
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U igs']
      interval: 5s
      timeout: 3s
      retries: 5

  server:
    build:
      context: .
      dockerfile: Dockerfile
      target: server
    environment:
      DATABASE_URL: postgresql://igs:${DB_PASSWORD:-igs_dev_2024}@db:5432/igs
      PORT: '3001'
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ['CMD-SHELL', 'wget -qO- http://127.0.0.1:3001/api/health >/dev/null 2>&1 || exit 1']
      interval: 10s
      timeout: 5s
      retries: 10

  pipeline:
    build:
      context: .
      dockerfile: Dockerfile
      target: pipeline
    environment:
      DATABASE_URL: postgresql://igs:${DB_PASSWORD:-igs_dev_2024}@db:5432/igs
      API_BASE_URL: http://server:3001
      ELEVATION_CACHE_DIR: /tmp/igs-elevation-cache
      SPECIES_CACHE_DIR: /tmp/igs-species-cache
      MPLCONFIGDIR: /tmp/matplotlib
      PIPELINE_AUTO_RUN: 'true'
      PIPELINE_KEEP_ALIVE: 'true'
      PIPELINE_ARGS: --skip-elevation --skip-species
    depends_on:
      db:
        condition: service_healthy
      server:
        condition: service_healthy
    healthcheck:
      test: ['CMD-SHELL', 'test -f /tmp/pipeline.last-success || exit 1']
      interval: 30s
      timeout: 5s
      retries: 5

  client:
    build:
      context: .
      dockerfile: Dockerfile
      target: client
    expose:
      - '80'
    depends_on:
      - server

volumes:
  pgdata:
